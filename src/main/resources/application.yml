server:
  port: 8080

spring:
  application:
    name: cathay-coindesk
  datasource:
    url: jdbc:h2:mem:cathaydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: false
  h2:
    console:
      enabled: true
      path: /h2-console

coindesk:
  api:
    url: https://kengp3.github.io/blog/coindesk.json

logging:
  level:
    com.cathay.coindesk: INFO
    org.hibernate.SQL: DEBUG